<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Venezuela earthquake — population in damaged buildings</title>
  <meta name="description" content="Estimated population exposed in satellite-detected damaged buildings, per source per admin division, for the 24 June 2026 Venezuela earthquake." />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <h1>Population in damaged buildings</h1>
    <p class="sub" id="event">24 June 2026 Venezuela earthquake</p>
    <p class="note" id="note"></p>
    <p class="sub"><a href="./validate.html">Validate → building footprints &amp; the population grid ↗</a></p>
  </header>

  <section class="cards" id="cards" aria-label="National totals"></section>

  <div class="controls">
    <label>Source
      <select id="metric"></select>
    </label>
    <label>Admin level
      <span class="toggle" id="level">
        <button data-level="adm1" class="on">State (adm1)</button>
        <button data-level="adm2">Municipality (adm2)</button>
      </span>
    </label>
    <span class="spacer"></span>
    <span class="legend" id="legend"></span>
  </div>

  <main>
    <div id="map"></div>
    <div id="tablewrap">
      <table id="table">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <footer>
    <p>Population: <span id="popsrc"></span>. Damage sources harmonized by
      <a href="https://github.com/OCHA-DAP/ds-geospatial-impact-estimates">ds-geospatial-impact-estimates</a>.
      Method: <a href="https://github.com/OCHA-DAP/ds-geospatial-impact-exposure/blob/main/docs/decisions/0001-dasymetric-building-population-exposure.md">ADR-0001</a>
      (area-weighted dasymetric). Detected damage is a floor, not a total.</p>
  </footer>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="./app.js"></script>
</body>
</html>
