name: Deploy web to GitHub Pages

# Publishes the static viewer in web/ (HTML + generated web/data/*.json,
# *.geojson) to GitHub Pages. The data files are produced by
# pipelines/estimate_exposure.py and committed to the repo, so this workflow
# only uploads them — it does not run the pipeline (which needs blob secrets).

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
